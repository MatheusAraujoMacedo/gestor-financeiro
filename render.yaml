# =============================================
# Render.com Deploy Config
# =============================================
# IMPORTANTE: As variáveis de ambiente sensíveis
# devem ser configuradas diretamente no Dashboard
# do Render, NUNCA neste arquivo.
# =============================================

databases:
  - name: gestor-db
    plan: free
    databaseName: gestor_financeiro
    user: gestor_user

services:
  - type: web
    name: financas-pro
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      # ⚠️ Configure as seguintes variáveis no Dashboard do Render:
      # - CLOUDINARY_CLOUD_NAME
      # - CLOUDINARY_API_KEY
      # - CLOUDINARY_API_SECRET
      # - GEMINI_API_KEY
      # - TWILIO_ACCOUNT_SID
      # - TWILIO_AUTH_TOKEN
      # - TWILIO_WHATSAPP_NUMBER
      # - USER_WHATSAPP_NUMBER
