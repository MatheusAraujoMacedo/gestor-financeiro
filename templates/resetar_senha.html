<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha — FinançasPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2.1">
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container" id="flashContainer">
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">
            <i class="fas {% if category == 'success' %}fa-check-circle{% elif category == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
            <span>{{ message }}</span>
            <button class="flash-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="auth-section">
        <div class="auth-card" style="animation: fadeInUp 0.5s ease-out;">
            <div class="auth-header">
                <div class="auth-icon auth-icon-green">
                    <i class="fas fa-lock-open"></i>
                </div>
                <h1>Defina sua nova senha</h1>
                <p>Escolha uma senha forte e segura</p>
            </div>

            <form class="auth-form" method="POST" action="{{ url_for('resetar_senha') }}" id="resetForm">
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Nova Senha</label>
                    <div style="position: relative;">
                        <input type="password" name="senha" placeholder="Mínimo 6 caracteres" required
                            autocomplete="new-password" id="resetSenha" minlength="6">
                        <button type="button"
                            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;"
                            onclick="togglePassword(this, 'resetSenha')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirmar Nova Senha</label>
                    <div style="position: relative;">
                        <input type="password" name="confirmar_senha" placeholder="Repita a nova senha" required
                            autocomplete="new-password" id="resetConfirmar" minlength="6">
                        <button type="button"
                            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer;"
                            onclick="togglePassword(this, 'resetConfirmar')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fas fa-check"></i> Salvar Nova Senha
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword(btn, inputId) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('resetForm').addEventListener('submit', function (e) {
            const senha = document.getElementById('resetSenha').value;
            const confirmar = document.getElementById('resetConfirmar').value;
            if (senha !== confirmar) {
                e.preventDefault();
                alert('As senhas não coincidem!');
            }
        });

        setTimeout(() => {
            const flash = document.getElementById('flashContainer');
            if (flash) flash.style.opacity = '0';
            setTimeout(() => { if (flash) flash.remove(); }, 500);
        }, 5000);
    </script>
</body>

</html>
