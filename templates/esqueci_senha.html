<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci Minha Senha — FinançasPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2.1">
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container" id="flashContainer">
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">
            <i class="fas {% if category == 'success' %}fa-check-circle{% elif category == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
            <span>{{ message }}</span>
            <button class="flash-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="auth-section">
        <div class="auth-card" style="animation: fadeInUp 0.5s ease-out;">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h1>Esqueceu sua senha?</h1>
                <p>Informe seu email e enviaremos um código de recuperação</p>
            </div>

            <form class="auth-form" method="POST" action="{{ url_for('esqueci_senha') }}">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email cadastrado</label>
                    <input type="email" name="email" placeholder="seu@email.com" required autocomplete="email">
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">
                    <i class="fas fa-paper-plane"></i> Enviar Código
                </button>
            </form>

            <div class="auth-footer">
                <p>Lembrou a senha? <a href="{{ url_for('login') }}">Fazer login</a></p>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            const flash = document.getElementById('flashContainer');
            if (flash) flash.style.opacity = '0';
            setTimeout(() => { if (flash) flash.remove(); }, 500);
        }, 5000);
    </script>
</body>

</html>
